name: meow-ios

options:
  bundleIdPrefix: io.github.madeye.meow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    GCC_C_LANGUAGE_STANDARD: c11
    ENABLE_MODULE_VERIFIER: NO

packages:
  MeowShared:
    path: MeowShared
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.1.3"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "12.0.0"

targets:
  meow-ios:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
        optional: true
        excludes:
          - "**/*.md"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: meow
        CFBundleShortVersionString: "1.3.1"
        CFBundleVersion: "2026052901"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false
        GOOGLE_ANALYTICS_IDFA_COLLECTION_ENABLED: false
        GOOGLE_ANALYTICS_ADID_COLLECTION_ENABLED: false
        CFBundleURLTypes:
          - CFBundleURLName: io.github.madeye.meow.deeplink
            CFBundleURLSchemes:
              - meow
    entitlements:
      path: App/App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.github.madeye.meow
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.github.madeye.meow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.madeye.meow
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: App/Sources/BridgingHeader.h
        GENERATE_INFOPLIST_FILE: NO
        CLANG_ENABLE_MODULES: YES
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/MeowCore/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/MeowCore/Frameworks
        OTHER_LDFLAGS:
          - -ObjC
    dependencies:
      - target: PacketTunnel
        embed: true
        codeSign: true
      - package: MeowShared
        product: MeowModels
      - package: MeowShared
        product: MeowIPC
      - package: Yams
      - package: Firebase
        product: FirebaseAnalytics
      - framework: MeowCore/Frameworks/MeowCore.xcframework
        embed: false
        optional: true
      - sdk: SystemConfiguration.framework
    postBuildScripts:
      - name: Strip Release binary (strip -Sx)
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
        script: |
          if [ "$CONFIGURATION" = "Release" ]; then
            /usr/bin/xcrun strip -Sx "$TARGET_BUILD_DIR/$EXECUTABLE_PATH"
          fi

  MeowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MeowTests
        excludes:
          - "README.md"
          - "Fixtures/README.md"
    dependencies:
      - target: meow-ios
      - package: MeowShared
        product: MeowModels
      - package: MeowShared
        product: MeowIPC
      - package: Yams
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/meow-ios.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/meow-ios
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: App/Sources/BridgingHeader.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/MeowCore/include

  MeowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MeowUITests
        excludes:
          - "README.md"
    dependencies:
      - target: meow-ios
      - package: MeowShared
        product: MeowModels
      - package: MeowShared
        product: MeowIPC
    settings:
      base:
        TEST_TARGET_NAME: meow-ios
        GENERATE_INFOPLIST_FILE: YES

  MeowIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MeowIntegrationTests
        excludes:
          - "README.md"
    dependencies:
      - target: meow-ios
      - package: MeowShared
        product: MeowModels
      - package: MeowShared
        product: MeowIPC
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/meow-ios.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/meow-ios
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: App/Sources/BridgingHeader.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/MeowCore/include

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel/Sources
    info:
      path: PacketTunnel/Info.plist
      properties:
        CFBundleDisplayName: meow Tunnel
        CFBundleShortVersionString: "1.3.1"
        CFBundleVersion: "2026052901"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: PacketTunnelProvider
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.github.madeye.meow
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.github.madeye.meow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.madeye.meow.PacketTunnel
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        GENERATE_INFOPLIST_FILE: NO
        CLANG_ENABLE_MODULES: YES
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/MeowCore/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/MeowCore/Frameworks
        OTHER_LDFLAGS:
          - -ObjC
          # boring-sys (via meow-transport boring-tls feature) vendors
          # BoringSSL C++ — link libc++ so std::__1 symbols resolve.
          - -lc++
    dependencies:
      - framework: MeowCore/Frameworks/MeowCore.xcframework
        embed: false
        optional: true
      - sdk: SystemConfiguration.framework
    postBuildScripts:
      - name: Strip Release binary (strip -Sx)
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
        script: |
          if [ "$CONFIGURATION" = "Release" ]; then
            /usr/bin/xcrun strip -Sx "$TARGET_BUILD_DIR/$EXECUTABLE_PATH"
          fi

schemes:
  meow-ios:
    build:
      targets:
        meow-ios: all
        PacketTunnel: all
        MeowTests: [test]
        MeowUITests: [test]
        MeowIntegrationTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MeowTests
        - MeowUITests
        - MeowIntegrationTests
      gatherCoverageData: true
      coverageTargets:
        - meow-ios
    archive:
      config: Release
